apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-backend:3b3683f965cbc0571c11fa60f7dca9f957fb92a0
          ports:
            - containerPort: 5000

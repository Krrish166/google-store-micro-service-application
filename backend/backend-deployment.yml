apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-backend:38fd8e7b2311fdffd4a4c01406aeda13b7f7f855
          ports:
            - containerPort: 5000

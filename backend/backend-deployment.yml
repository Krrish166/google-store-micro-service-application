apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-backend:4fd0e621e70a5cce460e0954f58dff9a2a3a5d89
          ports:
            - containerPort: 5000

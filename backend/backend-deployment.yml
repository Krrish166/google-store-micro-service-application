apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-backend:416fe31e77184a21a45b9bb5cbb36f24d8de10fa
          ports:
            - containerPort: 5000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-phones:416fe31e77184a21a45b9bb5cbb36f24d8de10fa
        ports:
        - containerPort: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-phones:8b6f3183e3ee53958d28911df77fce35813bc650
        ports:
        - containerPort: 80

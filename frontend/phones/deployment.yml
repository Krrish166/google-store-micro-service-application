apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-phones:3b3683f965cbc0571c11fa60f7dca9f957fb92a0
        ports:
        - containerPort: 80

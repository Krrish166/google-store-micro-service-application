apiVersion: apps/v1
kind: Deployment
metadata:
  name: computers-deployment
  labels:
    app: computers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: computers
  template:
    metadata:
      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-computers:8b6f3183e3ee53958d28911df77fce35813bc650
        ports:
        - containerPort: 80

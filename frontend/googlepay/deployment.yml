apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googlepay:416fe31e77184a21a45b9bb5cbb36f24d8de10fa
        ports:
        - containerPort: 80

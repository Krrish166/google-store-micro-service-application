apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googlepay:38fd8e7b2311fdffd4a4c01406aeda13b7f7f855
        ports:
        - containerPort: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googlepay:4fd0e621e70a5cce460e0954f58dff9a2a3a5d89
        ports:
        - containerPort: 80

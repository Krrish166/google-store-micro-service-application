apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googlepay:8b6f3183e3ee53958d28911df77fce35813bc650
        ports:
        - containerPort: 80

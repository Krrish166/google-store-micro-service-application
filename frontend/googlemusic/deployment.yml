apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googlemusic:8b6f3183e3ee53958d28911df77fce35813bc650
        ports:
        - containerPort: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googlemusic:52d4410141c1fd60ff5084b1af97c0b2e928086e
        ports:
        - containerPort: 80

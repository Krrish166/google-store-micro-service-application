apiVersion: apps/v1
kind: Deployment
metadata:
  name: electronics-deployment
  labels:
    app: electronics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: electronics
  template:
    metadata:
      labels:
        app: electronics
    spec:
      containers:
      - name: electronics
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-electronics:8b6f3183e3ee53958d28911df77fce35813bc650
        ports:
        - containerPort: 80

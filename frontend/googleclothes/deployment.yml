apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googleclothes:52d4410141c1fd60ff5084b1af97c0b2e928086e
        ports:
        - containerPort: 80

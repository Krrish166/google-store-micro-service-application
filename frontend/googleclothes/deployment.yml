apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googleclothes:38fd8e7b2311fdffd4a4c01406aeda13b7f7f855
        ports:
        - containerPort: 80

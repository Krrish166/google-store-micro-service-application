apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googleclothes:8b6f3183e3ee53958d28911df77fce35813bc650
        ports:
        - containerPort: 80

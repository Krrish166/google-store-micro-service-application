apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googleclothes:416fe31e77184a21a45b9bb5cbb36f24d8de10fa
        ports:
        - containerPort: 80

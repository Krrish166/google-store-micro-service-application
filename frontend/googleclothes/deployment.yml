apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googleclothes:3b3683f965cbc0571c11fa60f7dca9f957fb92a0
        ports:
        - containerPort: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-main:3b3683f965cbc0571c11fa60f7dca9f957fb92a0
        ports:
        - containerPort: 80


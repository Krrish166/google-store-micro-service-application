apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-main:416fe31e77184a21a45b9bb5cbb36f24d8de10fa
        ports:
        - containerPort: 80


apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-main:38fd8e7b2311fdffd4a4c01406aeda13b7f7f855
        ports:
        - containerPort: 80


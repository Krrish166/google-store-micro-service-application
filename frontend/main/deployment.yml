apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-main:8b6f3183e3ee53958d28911df77fce35813bc650
        ports:
        - containerPort: 80


apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googlegrocery:8b6f3183e3ee53958d28911df77fce35813bc650
        ports:
        - containerPort: 80

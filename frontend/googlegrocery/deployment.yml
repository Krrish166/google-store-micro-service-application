apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googlegrocery:3b3683f965cbc0571c11fa60f7dca9f957fb92a0
        ports:
        - containerPort: 80

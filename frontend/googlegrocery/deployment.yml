apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-googlegrocery:38fd8e7b2311fdffd4a4c01406aeda13b7f7f855
        ports:
        - containerPort: 80

  selector:
    matchLabels:
      app: earphones
  template:
    metadata:
      labels:
        app: earphones
    spec:
      containers:
      - name: earphones
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-earphones:52d4410141c1fd60ff5084b1af97c0b2e928086e
        ports:
        - containerPort: 80

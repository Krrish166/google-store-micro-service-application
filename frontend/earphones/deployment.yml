apiVersion: apps/v1
kind: Deployment
metadata:
  name: earphones-deployment
  labels:
    app: earphones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: earphones
  template:
    metadata:
      labels:
        app: earphones
    spec:
      containers:
      - name: earphones
        image: 811572529216.dkr.ecr.ap-south-1.amazonaws.com/shopping-site-earphones:38fd8e7b2311fdffd4a4c01406aeda13b7f7f855
        ports:
        - containerPort: 80
